<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A brief description of your page for SEO purposes">
    <title>Your Page Title</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --font-stack: 'Helvetica Neue', sans-serif;
        }
        body {
            font-family: var(--font-stack);
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header, footer {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem;
            text-align: center;
        }
        main {
            padding: 1rem;
            max-width: 800px;
            margin: auto;
        }
        /* Responsive Design */
        @media (max-width: 600px) {
            body {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Website</h1>
    </header>
    <main>
        <h2>About Us</h2>
        <p>This is a refactored version of the original index.html file.</p>
        <p>It implements best practices for semantic HTML and accessibility.</p>
    </main>
    <footer>
        <p>&copy; 2026 Your Website</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // JavaScript for interactivity
            console.log('Page loaded');
        });
    </script>
</body>
</html>
